schema_version: 2

# Entries are loaded eagerly, in this order, before MIDI input starts.
soundfonts:
  - id: piano
    file: /path/to/grand-piano.sf2
    bank: 0
    preset: 0

  - id: bass
    file: /path/to/electric-bass.sf2
    bank: 0
    preset: 34

# Put the SE49 in MMC transport mode. In that mode Transpose Down sends
# Rewind, and Transpose Up sends Stop. Zeta maps those messages to actions.
controls:
  recording:
    - type: machine_control
      command: rewind

  next_soundfont:
    - type: machine_control
      command: stop

# A momentary footswitch is a convenient hands-free alternative. Add this
# entry to controls.recording if desired:
#    - type: control_change
#      channel: 1
#      controller: 64
#      value: 127
