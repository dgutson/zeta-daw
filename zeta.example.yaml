schema_version: 1

# Entries are loaded eagerly, in this order, before MIDI input starts.
soundfonts:
  - id: piano
    file: /path/to/grand-piano.sf2
    bank: 0
    preset: 0

  - id: bass
    file: /path/to/electric-bass.sf2
    bank: 0
    preset: 34

parts:
  live: piano
  loop: bass

# Assign the SE49 Transpose buttons to Program Change once. Alternate
# Transpose Up to arm recording and Transpose Down to finish the take.
# The program number is deliberately ignored and the event is consumed.
controls:
  recording:
    - type: program_change
      channel: 1
      program: any

# A momentary footswitch is a convenient hands-free alternative:
#   recording:
#     - type: control_change
#       channel: 1
#       controller: 64
#       value: 127
