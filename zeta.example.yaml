schema_version: 7

# Each entry is one independently controlled loop slot. Keys are raw physical
# controller notes and are consumed only after loop_slot_by_note is pressed.
loop_slots:
  - C2
  - D2

# The SE49 fader uses its DAW integration port while MMC mode is active. Treat
# its channel-16 CC20 event as standard Channel Volume CC7. Omit this optional
# list for controllers that need no Control Change normalization.
midi_control_change_mappings:
  - source_port: "SE49 MIDI2"
    channel: 16
    controller: 20
    target_controller: 7

# Entries are loaded eagerly, in this order, before MIDI input starts.
soundfonts:
  - id: piano
    file: /path/to/grand-piano.sf2
    bank: 0
    preset: 0
    # Optional physical key used after soundfont_by_note is pressed.
    key: G3

  - id: bass
    file: /path/to/electric-bass.sf2
    bank: 0
    preset: 34
    key: A3

# Put the SE49 in MMC transport mode. In that mode Transpose Down sends
# Rewind, Transpose Up sends Stop, Octave Down sends Play, and Octave Up sends
# Record Strobe. This example uses Transpose Down for loop-slot selection and
# Transpose Up for direct SoundFont selection.
controls:
  loop_slot_by_note:
    type: machine_control
    command: rewind

  soundfont_by_note:
    type: machine_control
    command: stop

  octave_down:
    type: machine_control
    command: play

  octave_up:
    type: machine_control
    command: record_strobe

# A momentary footswitch is a convenient hands-free alternative. Replace the
# controls.loop_slot_by_note binding with this mapping if desired:
#    type: control_change
#    channel: 1
#    controller: 64
#    value: 127
