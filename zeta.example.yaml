schema_version: 5

# The SE49 fader uses its DAW integration port while MMC mode is active. Treat
# its channel-16 CC20 event as standard Channel Volume CC7. Use an empty list
# for controllers that need no Control Change normalization.
midi_control_change_mappings:
  - source_port: "SE49 MIDI2"
    channel: 16
    controller: 20
    target_controller: 7

# Entries are loaded eagerly, in this order, before MIDI input starts.
soundfonts:
  - id: piano
    file: /path/to/grand-piano.sf2
    bank: 0
    preset: 0

  - id: bass
    file: /path/to/electric-bass.sf2
    bank: 0
    preset: 34

# Put the SE49 in MMC transport mode. In that mode Transpose Down sends
# Rewind, Transpose Up sends Stop, Octave Down sends Play, and Octave Up sends
# Record Strobe. Zeta maps those messages to actions.
controls:
  recording:
    type: machine_control
    command: rewind

  next_soundfont:
    type: machine_control
    command: stop

  octave_down:
    type: machine_control
    command: play

  octave_up:
    type: machine_control
    command: record_strobe

# A momentary footswitch is a convenient hands-free alternative. Replace the
# controls.recording binding with this mapping if desired:
#    type: control_change
#    channel: 1
#    controller: 64
#    value: 127
