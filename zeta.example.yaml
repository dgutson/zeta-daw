schema_version: 6

# The SE49 fader uses its DAW integration port while MMC mode is active. Treat
# its channel-16 CC20 event as standard Channel Volume CC7. Omit this optional
# list for controllers that need no Control Change normalization.
midi_control_change_mappings:
  - source_port: "SE49 MIDI2"
    channel: 16
    controller: 20
    target_controller: 7

# Entries are loaded eagerly, in this order, before MIDI input starts.
soundfonts:
  - id: piano
    file: /path/to/grand-piano.sf2
    bank: 0
    preset: 0

  - id: bass
    file: /path/to/electric-bass.sf2
    bank: 0
    preset: 34

# Press the configured soundfont_by_note control and then one of these notes to
# select that SoundFont directly. Channels are human-facing; keys are raw MIDI
# numbers before Zeta octave transposition.
soundfont_note_selections:
  - channel: 1
    key: 60
    soundfont: piano

  - channel: 1
    key: 62
    soundfont: bass

# Put the SE49 in MMC transport mode. In that mode Transpose Down sends
# Rewind, Transpose Up sends Stop, Octave Down sends Play, and Octave Up sends
# Record Strobe. This example uses Transpose Up to arm direct SoundFont
# selection. To use sequential selection instead, rename soundfont_by_note to
# next_soundfont and omit soundfont_note_selections.
controls:
  recording:
    type: machine_control
    command: rewind

  soundfont_by_note:
    type: machine_control
    command: stop

  octave_down:
    type: machine_control
    command: play

  octave_up:
    type: machine_control
    command: record_strobe

# A momentary footswitch is a convenient hands-free alternative. Replace the
# controls.recording binding with this mapping if desired:
#    type: control_change
#    channel: 1
#    controller: 64
#    value: 127
